<!DOCTYPE html>
<html>
<head>
  <title>H4KKEN Animation Debug</title>
  <style>
    body { margin: 0; background: #111; color: #0f0; font-family: monospace; }
    canvas { display: block; }
    #log { position: absolute; top: 10px; left: 10px; max-height: 90vh; overflow-y: auto; font-size: 12px; white-space: pre-wrap; }
    #controls { position: absolute; bottom: 10px; left: 10px; }
    button { margin: 2px; padding: 5px 10px; background: #333; color: #0f0; border: 1px solid #0f0; cursor: pointer; }
    button:hover { background: #0f0; color: #000; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="log"></div>
  <div id="controls"></div>
  <script type="module">
    import * as THREE from 'three';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { Fighter } from './js/Fighter.js';

    const logEl = document.getElementById('log');
    const ctrlEl = document.getElementById('controls');
    const logBuffer = [];
    let flushTimer = null;
    function log(msg) {
      logEl.textContent += msg + '\n';
      console.log(msg);
      logBuffer.push(msg);
      if (!flushTimer) {
        flushTimer = setTimeout(() => {
          fetch('/api/debug', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ lines: logBuffer.splice(0) })
          }).catch(() => {});
          flushTimer = null;
        }, 500);
      }
    }

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.5, 4);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1, 0);
    controls.update();

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);
    scene.add(new THREE.GridHelper(10, 10));

    log('Loading via Fighter.loadAssets()...');
    const { baseModel, animClips, texture } = await Fighter.loadAssets((p) => {
      log(`  Loading... ${(p * 100).toFixed(0)}%`);
    });

    // Log trimmed clip durations
    log('\n📋 Trimmed clip durations:');
    for (const [name, clip] of Object.entries(animClips)) {
      log(`  ${name}: ${clip.duration.toFixed(2)}s, ${clip.tracks.length} tracks`);
    }

    // Set up model directly (no clone) for testing
    const model = baseModel;
    model.scale.set(0.013, 0.013, 0.013);
    scene.add(model);

    const mixer = new THREE.AnimationMixer(model);
    const actions = {};
    let currentAction = null;

    const onceAnims = new Set(['punch1', 'punch2', 'heavyPunch', 'hurt1', 'hurt2', 'jump', 'landing', 'victory', 'leanRight', 'leanLeft', 'kickRight', 'kickLeft', 'lowKick', 'sweepKick']);

    for (const [name, clip] of Object.entries(animClips)) {
      const action = mixer.clipAction(clip);
      if (onceAnims.has(name)) {
        action.setLoop(THREE.LoopOnce);
        action.clampWhenFinished = true;
      } else {
        action.setLoop(THREE.LoopRepeat, Infinity);
      }
      actions[name] = action;

      const btn = document.createElement('button');
      btn.textContent = name;
      btn.onclick = () => {
        if (currentAction) currentAction.fadeOut(0.2);
        action.reset();
        action.setEffectiveWeight(1);
        action.setEffectiveTimeScale(1);
        action.fadeIn(0.2);
        action.play();
        currentAction = action;
        log(`▶ Playing: ${name} (dur: ${clip.duration.toFixed(2)}s)`);
      };
      ctrlEl.appendChild(btn);
    }

    // === BONE ANALYSIS ===
    // Sample combat idle at various times and log bone quaternions
    const keyBones = ['thigh_r', 'thigh_l', 'calf_r', 'calf_l', 'foot_r', 'foot_l',
                      'upperarm_r', 'upperarm_l', 'lowerarm_r', 'lowerarm_l',
                      'spine_01', 'spine_02', 'spine_03', 'pelvis', 'root'];

    function sampleBones(label) {
      const data = {};
      model.traverse(n => {
        if (n.isBone && keyBones.includes(n.name)) {
          const q = n.quaternion;
          const e = new THREE.Euler().setFromQuaternion(q);
          data[n.name] = {
            q: `(${q.x.toFixed(4)}, ${q.y.toFixed(4)}, ${q.z.toFixed(4)}, ${q.w.toFixed(4)})`,
            euler: `(${(e.x*180/Math.PI).toFixed(1)}°, ${(e.y*180/Math.PI).toFixed(1)}°, ${(e.z*180/Math.PI).toFixed(1)}°)`,
          };
        }
      });
      log(`\n🔬 ${label}:`);
      for (const bone of keyBones) {
        if (data[bone]) {
          log(`  ${bone}: q=${data[bone].q} euler=${data[bone].euler}`);
        }
      }
    }

    // T-pose (before any animation)
    sampleBones('T-POSE (base model)');

    // Play combatIdle, sample at t=0 and mid-point
    log('\n🔄 Playing combatIdle...');
    if (actions.combatIdle) {
      const a = actions.combatIdle;
      a.reset(); a.setEffectiveWeight(1); a.setEffectiveTimeScale(1);
      a.play(); currentAction = a;
      mixer.update(0.001); // advance tiny bit to apply first frame
      sampleBones('COMBAT IDLE (first frame)');
      mixer.update(0.5); // advance to mid-animation
      sampleBones('COMBAT IDLE (mid)');
    }

    // Now sample punch1 at the peak punch frame
    setTimeout(() => {
      if (actions.punch1 && currentAction) {
        currentAction.fadeOut(0.01);
        const a = actions.punch1;
        a.reset(); a.setEffectiveWeight(1); a.setEffectiveTimeScale(1);
        a.fadeIn(0.01); a.play(); currentAction = a;
        mixer.update(0.001);
        sampleBones('PUNCH1 (start)');
        // Advance to ~40% where the punch extends
        const dur = animClips.punch1?.duration || 0.73;
        mixer.update(dur * 0.4);
        sampleBones('PUNCH1 (peak ~40%)');
      }
    }, 200);

    // Sample jump at the peak
    setTimeout(() => {
      if (actions.jump && currentAction) {
        currentAction.fadeOut(0.01);
        const a = actions.jump;
        a.reset(); a.setEffectiveWeight(1); a.setEffectiveTimeScale(1);
        a.fadeIn(0.01); a.play(); currentAction = a;
        mixer.update(0.001);
        sampleBones('JUMP (start)');
        const dur = animClips.jump?.duration || 0.85;
        mixer.update(dur * 0.3);
        sampleBones('JUMP (30% - airborne)');
      }
    }, 400);

    // Sample kickRight to see what our current attempt does
    setTimeout(() => {
      if (actions.kickRight && currentAction) {
        currentAction.fadeOut(0.01);
        const a = actions.kickRight;
        a.reset(); a.setEffectiveWeight(1); a.setEffectiveTimeScale(1);
        a.fadeIn(0.01); a.play(); currentAction = a;
        mixer.update(0.001);
        sampleBones('KICK_RIGHT (start)');
        mixer.update(0.2);
        sampleBones('KICK_RIGHT (peak ~0.2s)');
      }

      // After sampling, go back to combatIdle
      setTimeout(() => {
        if (actions.combatIdle && currentAction) {
          currentAction.fadeOut(0.15);
          const a = actions.combatIdle;
          a.reset(); a.setEffectiveWeight(1); a.setEffectiveTimeScale(1);
          a.fadeIn(0.15); a.play(); currentAction = a;
        }
      }, 500);
    }, 600);

    // Render loop
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      if (mixer) mixer.update(dt);
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
